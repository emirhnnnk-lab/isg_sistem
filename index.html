<body class="bg-slate-50 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- PDF'DEN ALINAN VARSAYILAN LOKAL VERİLER (Supabase boşken veya bağlı değilken kullanılır) ---
        const initialExperts = [
            { id: 'exp1', name: "Ahmet Yılmaz (İSG Uzmanı)" },
            { id: 'exp2', name: "Ayşe Kaya (İSG Uzmanı)" }
        ];

        const initialCompanies = [
            { 
                id: 'comp1', name: "12 M TURİZM SAN. VE DIŞ TİC.", debt: "127.300,48 ₺", progress: 65, nextVisit: "2026-05-10", expertId: 'exp1',
                report: { status: 'draft', date: '27.04.2026', findings: [
                    { id: 1, observation: 'Ana elektrik panosunda kaçak akım rölesi (KAR) eksik.', risk: 'Yüksek', action: 'Acilen 300mA KAR takılmalı.', deadline: '2026-05-01' }
                ]}
            },
            { 
                id: 'comp2', name: "AKRA CAM DEK. MAK. SAN.", debt: "44.120,99 ₺", progress: 40, nextVisit: "2026-05-12", expertId: 'exp1',
                report: { status: 'draft', date: '', findings: []}
            },
            { 
                id: 'comp3', name: "AYYILDIZ GRUP TEKSTİL A.Ş.", debt: "4.661,00 ₺", progress: 90, nextVisit: "2026-05-05", expertId: 'exp2',
                report: { status: 'submitted', date: '25.04.2026', findings: [
                    { id: 2, observation: 'Acil çıkış kapısının önü paletlerle kapatılmış.', risk: 'Yüksek', action: 'Paletler depoya kaldırılmalı ve güzergah boşaltılmalı.', deadline: '2026-04-26' }
                ]}
            },
            { 
                id: 'comp4', name: "MEDİCANA HASTANE İŞLETMELERİ", debt: "81.700,00 ₺", progress: 20, nextVisit: "2026-05-08", expertId: 'exp1',
                report: { status: 'draft', date: '', findings: []}
            },
            { 
                id: 'comp5', name: "SİRENA MARİNE DENİZCİLİK", debt: "186.598,92 ₺", progress: 50, nextVisit: "2026-05-15", expertId: 'exp2',
                report: { status: 'draft', date: '', findings: []}
            },
            { 
                id: 'comp6', name: "BEYPA BEYPİLİÇ ÜRÜNLERİ", debt: "879,99 ₺", progress: 100, nextVisit: "2026-05-20", expertId: 'exp2',
                report: { status: 'submitted', date: '20.04.2026', findings: [
                    { id: 3, observation: 'Personel soyunma odalarında havalandırma yetersiz.', risk: 'Düşük', action: 'Fan sistemi bakımı yapılmalı.', deadline: '2026-05-10' }
                ]}
            }
        ];

        const initialBulletins = [
            { id: 'bul1', title: "Yüksekte Çalışma Kuralları", date: "24 Nisan 2026", content: "Emniyet kemeri kullanımı zorunludur. İskele kurulumları yetkili kişilerce yapılmalıdır." },
            { id: 'bul2', title: "Kişisel Koruyucu Donanım (KKD)", date: "17 Nisan 2026", content: "Baret, çelik burunlu ayakkabı ve fosforlu yelek olmadan sahaya giriş kesinlikle yasaktır." }
        ];

        // SQL Kurulum Kodu Yardımı (Tek tıkla kopyalamak için)
        const sqlQueryText = `-- 1. FİRMALAR TABLOSUNU OLUŞTUR
CREATE TABLE IF NOT EXISTS public.companies (
    id TEXT PRIMARY KEY,
    name TEXT NOT NULL,
    debt TEXT,
    progress INTEGER DEFAULT 0,
    nextVisit TEXT,
    expertId TEXT,
    report JSONB DEFAULT '{}'::jsonb
);

-- 2. BÜLTENLER TABLOSUNU OLUŞTUR
CREATE TABLE IF NOT EXISTS public.bulletins (
    id TEXT PRIMARY KEY,
    title TEXT NOT NULL,
    date TEXT,
    content TEXT
);

-- 3. BAŞLANGIÇ VERİLERİNİ EKLE
INSERT INTO public.companies (id, name, debt, progress, nextVisit, expertId, report)
VALUES 
('comp1', '12 M TURİZM SAN. VE DIŞ TİC.', '127.300,48 ₺', 65, '2026-05-10', 'exp1', '{"status": "draft", "date": "27.04.2026", "findings": [{"id": 1, "observation": "Ana elektrik panosunda kaçak akım rölesi (KAR) eksik.", "risk": "Yüksek", "action": "Acilen 300mA KAR takılmalı.", "deadline": "2026-05-01"}]}'),
('comp2', 'AKRA CAM DEK. MAK. SAN.', '44.120,99 ₺', 40, '2026-05-12', 'exp1', '{"status": "draft", "date": "", "findings": []}'),
('comp3', 'AYYILDIZ GRUP TEKSTİL A.Ş.', '4.661,00 ₺', 90, '2026-05-05', 'exp2', '{"status": "submitted", "date": "25.04.2026", "findings": [{"id": 2, "observation": "Acil çıkış kapısının önü paletlerle kapatılmış.", "risk": "Yüksek", "action": "Paletler depoya kaldırılmalı ve güzergah boşaltılmalı.", "deadline": "2026-04-26"}]}'),
('comp4', 'MEDİCANA HASTANE İŞLETMELERİ', '81.700,00 ₺', 20, '2026-05-08', 'exp1', '{"status": "draft", "date": "", "findings": []}'),
('comp5', 'SİRENA MARİNE DENİZCİLİK', '186.598,92 ₺', 50, '2026-05-15', 'exp2', '{"status": "draft", "date": "", "findings": []}'),
('comp6', 'BEYPA BEYPİLİÇ ÜRÜNLERİ', '879,99 ₺', 100, '2026-05-20', 'exp2', '{"status": "submitted", "date": "20.04.2026", "findings": [{"id": 3, "observation": "Personel soyunma odalarında havalandırma yetersiz.", "risk": "Düşük", "action": "Fan sistemi bakımı yapılmalı.", "deadline": "2026-05-10"}]}');

INSERT INTO public.bulletins (id, title, date, content)
VALUES 
('bul1', 'Yüksekte Çalışma Kuralları', '24 Nisan 2026', 'Emniyet kemeri kullanımı zorunludur. İskele kurulumları yetkili kişilerce yapılmalıdır.'),
('bul2', 'Kişisel Koruyucu Donanım (KKD)', '17 Nisan 2026', 'Baret, çelik burunlu ayakkabı ve fosforlu yelek olmadan sahaya giriş kesinlikle yasaktır.');`;

        function App() {
            const [currentView, setCurrentView] = useState('login'); 
            const [currentUser, setCurrentUser] = useState(null);
            
            // LocalStorage veri kalıcılığı
            const [companies, setCompanies] = useState(() => {
                const saved = localStorage.getItem('isg_companies');
                return saved ? JSON.parse(saved) : initialCompanies;
            });

            const [experts, setExperts] = useState(initialExperts);
            const [bulletins, setBulletins] = useState(initialBulletins);
            
            const [selectedCompanyId, setSelectedCompanyId] = useState('comp1');
            const [reportModal, setReportModal] = useState({ isOpen: false, mode: null, companyId: null });

            // Supabase Bağlantı Bilgileri
            const [supabaseUrl, setSupabaseUrl] = useState(() => localStorage.getItem('isg_supabase_url') || '');
            const [supabaseAnonKey, setSupabaseAnonKey] = useState(() => localStorage.getItem('isg_supabase_anon_key') || '');
            const [supabaseClient, setSupabaseClient] = useState(null);
            const [isSupabaseConnected, setIsSupabaseConnected] = useState(false);
            const [isTableMissing, setIsTableMissing] = useState(false); // Tablo hatasını yakalama

            // Bildirim (Toast) State
            const [toast, setToast] = useState({ message: '', type: 'info', show: false });

            // Gelişmiş Dinamik Sunucu IP Ayarı: Tarayıcının mevcut URL'ini otomatik algılar ve temizler
            const [serverIp, setServerIp] = useState(() => {
                const saved = localStorage.getItem('isg_server_ip');
                if (saved) return saved;
                
                let loc = window.location;
                let currentUrl = `${loc.protocol}//${loc.host}${loc.pathname}`;
                
                // Blob kısıtlamalarını temizleme koruması
                if (currentUrl.startsWith('blob:')) {
                    currentUrl = currentUrl.replace('blob:', '');
                }
                // Sandbox içindeki geçici uydurma url'leri de temizleyelim
                if (currentUrl.includes('usercontent.goog') || loc.protocol === 'file:') {
                    return ""; // Boş bırakalım ki yedek plan devreye girsin veya ayardan girilsin
                }
                return currentUrl;
            });
            const [showSettings, setShowSettings] = useState(false);

            // Toast gösterme yardımcı fonksiyonu
            const showToastMessage = (message, type = 'success') => {
                setToast({ message, type, show: true });
                setTimeout(() => {
                    setToast(prev => ({ ...prev, show: false }));
                }, 3000);
            };

            // Güvenli Kopyalama Fonksiyonu (document.execCommand fallback kullanan ve iframe dostu yöntem)
            const handleClipboardCopy = (textToCopy) => {
                try {
                    const textarea = document.createElement('textarea');
                    textarea.value = textToCopy;
                    textarea.style.position = 'fixed'; // Ekrandan gizlemek için konumlandırma
                    textarea.style.opacity = '0';
                    document.body.appendChild(textarea);
                    textarea.select();
                    textarea.setSelectionRange(0, 99999); // Mobil uyumluluk için

                    const success = document.execCommand('copy');
                    document.body.removeChild(textarea);

                    if (success) {
                        showToastMessage("SQL Script başarıyla kopyalandı!");
                    } else {
                        throw new Error("Kopyalama komutu başarısız döndü");
                    }
                } catch (err) {
                    console.warn("Kopyalama işleminde hata oluştu, alternatif deneniyor:", err);
                    try {
                        navigator.clipboard.writeText(textToCopy);
                        showToastMessage("SQL Script başarıyla kopyalandı!");
                    } catch (fallbackErr) {
                        showToastMessage("Panoya kopyalanamadı. Lütfen SQL kodunu el ile seçip kopyalayın.", "error");
                    }
                }
            };

            // --- SUPABASE CLIENT BAŞLATMA ---
            useEffect(() => {
                if (supabaseUrl && supabaseAnonKey) {
                    try {
                        const client = supabase.createClient(supabaseUrl, supabaseAnonKey);
                        setSupabaseClient(client);
                        setIsSupabaseConnected(true);
                        setIsTableMissing(false);
                        console.log("Supabase istemcisi başarıyla başlatıldı!");
                    } catch (error) {
                        console.error("Supabase başlatma hatası:", error);
                        setIsSupabaseConnected(false);
                    }
                } else {
                    setSupabaseClient(null);
                    setIsSupabaseConnected(false);
                }
            }, [supabaseUrl, supabaseAnonKey]);

            // --- SUPABASE VERİ ÇEKME AKIŞI ---
            useEffect(() => {
                if (!supabaseClient) return;

                const fetchSupabaseData = async () => {
                    try {
                        // Firmaları çek
                        const { data: companiesData, error: compError } = await supabaseClient
                            .from('companies')
                            .select('*')
                            .order('id', { ascending: true });

                        if (compError) {
                            // Tablo bulunamadı hatası (PGRST205) durumunu yakala
                            if (compError.code === 'PGRST205' || compError.message.includes('companies') || compError.message.includes('relation "public.companies" does not exist')) {
                                setIsTableMissing(true);
                                throw new Error("Companies tablosu Supabase üzerinde mevcut değil.");
                            }
                            throw compError;
                        }
                        
                        setIsTableMissing(false);
                        if (companiesData && companiesData.length > 0) {
                            setCompanies(companiesData);
                        }

                        // Bültenleri çek
                        const { data: bulletinsData, error: bulError } = await supabaseClient
                            .from('bulletins')
                            .select('*');

                        if (bulError) throw bulError;
                        if (bulletinsData && bulletinsData.length > 0) {
                            setBulletins(bulletinsData);
                        }
                    } catch (err) {
                        console.warn("Supabase veri çekme hatası (Lokal yedek veriler devrede kalıyor):", err);
                        // Tablo yoksa lokal yedekleri güvenle kullan
                        const saved = localStorage.getItem('isg_companies');
                        if (saved) {
                            setCompanies(JSON.parse(saved));
                        } else {
                            setCompanies(initialCompanies);
                        }
                    }
                };

                fetchSupabaseData();

                // WebSocket Engeli/Canvas Sandbox korumalı Real-time Sync Aboneliği olmadan Polling entegre
                const intervalId = setInterval(() => {
                    fetchSupabaseData();
                }, 10000);

                return () => {
                    clearInterval(intervalId);
                };
            }, [supabaseClient]);

            // --- AKILLI YÖNLENDİRİCİ (ROUTER) VE BAŞLANGIÇ KONTROLÜ ---
            useEffect(() => {
                try {
                    const params = new URLSearchParams(window.location.search);
                    const viewParam = params.get('view');
                    const idParam = params.get('id');

                    if (viewParam === 'company') {
                        setCurrentView('qr_company');
                        if (idParam) {
                            setSelectedCompanyId(idParam);
                        }
                    } else if (viewParam === 'worker') {
                        setCurrentView('qr_worker');
                    }
                } catch (e) {
                    console.warn("URL parametreleri çözümlenemedi:", e);
                }
            }, []);

            // Görünüm Değiştirildiğinde URL'i Güncelleyen Güvenli Fonksiyon
            const navigateTo = (view, companyId = null) => {
                setCurrentView(view);
                let targetId = companyId || selectedCompanyId;
                if (companyId) {
                    setSelectedCompanyId(companyId);
                }

                try {
                    if (view === 'qr_company') {
                        window.history.pushState({}, '', `?view=company&id=${targetId}`);
                    } else if (view === 'qr_worker') {
                        window.history.pushState({}, '', `?view=worker`);
                    } else {
                        window.history.pushState({}, '', window.location.pathname || '/');
                    }
                } catch (error) {
                    console.warn("Iframe kısıtlaması nedeniyle pushState çalıştırılamadı, state üzerinden devam ediliyor:", error);
                }
            };

            // Veritabanı bağlı değilse lokal hafızaya kaydetmeye devam et
            useEffect(() => {
                if (!isSupabaseConnected || isTableMissing) {
                    localStorage.setItem('isg_companies', JSON.stringify(companies));
                }
            }, [companies, isSupabaseConnected, isTableMissing]);

            // Ayarları Kaydet
            const saveSettings = (ip, sUrl, sKey) => {
                let cleanedIp = ip;
                if (cleanedIp.startsWith('blob:')) {
                    cleanedIp = cleanedIp.replace('blob:', '');
                }
                setServerIp(cleanedIp);
                localStorage.setItem('isg_server_ip', cleanedIp);

                setSupabaseUrl(sUrl);
                localStorage.setItem('isg_supabase_url', sUrl);

                setSupabaseAnonKey(sKey);
                localStorage.setItem('isg_supabase_anon_key', sKey);

                setIsTableMissing(false);
                setShowSettings(false);
                showToastMessage("Bağlantı ayarları başarıyla güncellendi!");
            };

            // Lucide ikonlarını her render sonrası güncelle
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            // --- VERİ GÜNCELLEME FONKSİYONLARI (SUPABASE & LOKAL DESTEKLİ) ---

            const increaseProgress = async (companyId) => {
                const updatedCompanies = companies.map(c => {
                    if (c.id === companyId) {
                        return { ...c, progress: Math.min(c.progress + 10, 100) };
                    }
                    return c;
                });
                setCompanies(updatedCompanies);

                // Supabase bağlantısı aktifse bulutta güncelle
                if (isSupabaseConnected && supabaseClient && !isTableMissing) {
                    const company = updatedCompanies.find(c => c.id === companyId);
                    try {
                        const { error } = await supabaseClient
                            .from('companies')
                            .update({ progress: company.progress })
                            .eq('id', companyId);
                        if (error) throw error;
                        showToastMessage("Saha denetim ilerlemesi güncellendi!");
                    } catch (err) {
                        console.error("Supabase ilerleme güncelleme hatası:", err);
                        showToastMessage("İlerleme kaydedilirken bulut hatası oluştu.", "error");
                    }
                } else {
                    showToastMessage("Lokal modda ilerleme kaydedildi.");
                }
            };

            const saveReport = async (companyId, reportData, status) => {
                const updatedCompanies = companies.map(c => {
                    if (c.id === companyId) {
                        return { ...c, report: { ...reportData, status: status } };
                    }
                    return c;
                });
                setCompanies(updatedCompanies);
                setReportModal({ isOpen: false, mode: null, companyId: null });

                // Supabase bağlantısı aktifse bulutta güncelle
                if (isSupabaseConnected && supabaseClient && !isTableMissing) {
                    const company = updatedCompanies.find(c => c.id === companyId);
                    try {
                        const { error } = await supabaseClient
                            .from('companies')
                            .update({ report: company.report })
                            .eq('id', companyId);
                        if (error) throw error;
                        showToastMessage("Saha raporu başarıyla kaydedildi!");
                    } catch (err) {
                        console.error("Supabase rapor kaydetme hatası:", err);
                        showToastMessage("Rapor buluta yüklenirken hata oluştu.", "error");
                    }
                } else {
                    showToastMessage("Lokal modda rapor başarıyla kaydedildi!");
                }
            };

            // --- BİLEŞENLER ---

            // Özel Toast Mesajı Kutusu
            const ToastNotification = () => {
                if (!toast.show) return null;
                const isError = toast.type === 'error';
                return (
                    <div className="fixed bottom-6 right-6 z-50 flex items-center gap-2.5 bg-slate-900 text-white px-5 py-3.5 rounded-2xl shadow-2xl border border-slate-800 transition-all duration-300 transform translate-y-0">
                        <i data-lucide={isError ? "alert-triangle" : "check-circle-2"} class={isError ? "text-red-400 w-5 h-5" : "text-emerald-400 w-5 h-5"}></i>
                        <span className="text-sm font-semibold">{toast.message}</span>
                    </div>
                );
            };

            // Gelişmiş Ayarlar Paneli (Hem Yerel IP Hem Supabase Ayarı)
            const SettingsModal = () => {
                const [tempIp, setTempIp] = useState(serverIp);
                const [tempUrl, setTempUrl] = useState(supabaseUrl);
                const [tempKey, setTempKey] = useState(supabaseAnonKey);

                return (
                    <div className="fixed inset-0 bg-slate-950/70 z-40 flex items-center justify-center p-4 overflow-y-auto">
                        <div className="bg-white rounded-3xl p-6 w-full max-w-lg shadow-2xl border border-slate-100 my-8">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2">
                                    <i data-lucide="settings" class="text-blue-500"></i> Sistem Bağlantı Ayarları
                                </h3>
                                <button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-slate-600">
                                    <i data-lucide="x" class="w-5 h-5"></i>
                                </button>
                            </div>
                            
                            <div className="space-y-6">
                                {/* Supabase Kurulum Alanı */}
                                <div className="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                                    <h4 className="font-bold text-sm text-blue-900 mb-2 flex items-center gap-1">
                                        <i data-lucide="database" class="w-4 h-4"></i> 1. Supabase Bulut Veritabanı Bağlantısı
                                    </h4>
                                    <p className="text-xs text-blue-700 mb-4 leading-relaxed">
                                        Supabase projenizin API ayarlarından aldığınız bilgileri buraya yapıştırın. Sistem verileri anında gerçek zamanlı buluta taşınacaktır.
                                    </p>
                                    <div className="space-y-3">
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-500 block uppercase mb-1">Project URL</label>
                                            <input 
                                                type="text" 
                                                value={tempUrl} 
                                                onChange={(e) => setTempUrl(e.target.value)} 
                                                placeholder="https://your-project.supabase.co"
                                                className="w-full border border-slate-200 p-2.5 rounded-xl text-xs font-semibold outline-none focus:border-blue-500 bg-white"
                                            />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-500 block uppercase mb-1">API Anon Key</label>
                                            <input 
                                                type="password" 
                                                value={tempKey} 
                                                onChange={(e) => setTempKey(e.target.value)} 
                                                placeholder="eyJhbGciOi..."
                                                className="w-full border border-slate-200 p-2.5 rounded-xl text-xs font-semibold outline-none focus:border-blue-500 bg-white"
                                            />
                                        </div>
                                    </div>
                                </div>

                                {/* Mobil Tarama Alanı */}
                                <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200">
                                    <h4 className="font-bold text-sm text-slate-800 mb-2 flex items-center gap-1">
                                        <i data-lucide="qr-code" class="w-4 h-4 text-emerald-500"></i> 2. Mobil QR Tarama Ayarı
                                    </h4>
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-bold text-slate-600 block uppercase mb-1">Uygulama Adresi / Bilgisayar IP / Vercel Domain</label>
                                        <input 
                                            type="text" 
                                            value={tempIp} 
                                            onChange={(e) => setTempIp(e.target.value)} 
                                            placeholder="Örn: http://192.168.1.35:5500 veya https://isg-demo.vercel.app"
                                            className="w-full border border-slate-200 p-2.5 rounded-xl text-xs font-semibold outline-none focus:border-blue-500 bg-white"
                                        />
                                        <span className="text-[10px] text-slate-400 block leading-tight">
                                            * Yerel ağda test ederken kendi Wi-Fi IP adresinizi, Vercel'e deploy ettiyseniz gerçek Vercel site adresinizi yazın.
                                        </span>
                                    </div>
                                </div>
                            </div>

                            <div className="flex gap-2 mt-6">
                                <button onClick={() => saveSettings(tempIp, tempUrl, tempKey)} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold p-3 rounded-xl transition text-sm">
                                    Değişiklikleri Kaydet
                                </button>
                                <button onClick={() => {
                                    setTempUrl('');
                                    setTempKey('');
                                    setTempIp(window.location.origin + window.location.pathname);
                                }} className="px-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium rounded-xl transition text-xs">

                    setReportData({

                        findings: reportData.findings.map(f => f.id === id ? { ...f, [field]: value } : f)
                    });

            const QRGeneratorCompany = () => {
                const selectedCompany = companies.find(c => c.id === selectedCompanyId) || companies[0];
                
                const getDynamicQrUrl = () => {
                    let cleanedBase = serverIp;
                    if (!cleanedBase || cleanedBase.startsWith('file:') || cleanedBase === 'PROJE_YUKLENDIGINDE_BURAYA_URL_GELECEK') {
                        if (window.location.origin && !window.location.origin.startsWith('null') && !window.location.origin.startsWith('file:')) {
                            let originUrl = `${window.location.origin}${window.location.pathname}`;
                            if (originUrl.startsWith('blob:')) {
                                originUrl = originUrl.replace('blob:', '');
                            }
                            return `${originUrl}?view=company&id=${selectedCompany?.id}`;
                        }
                        return `http://192.168.1.100:5500/index.html?view=company&id=${selectedCompany?.id}`;
                    }
                    cleanedBase = cleanedBase.split('?')[0];
                    if (cleanedBase.startsWith('blob:')) {
                        cleanedBase = cleanedBase.replace('blob:', '');
                    }
                    return `${cleanedBase}?view=company&id=${selectedCompany?.id}`;
                };

                const qrUrl = getDynamicQrUrl();
                const qrImageSource = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(qrUrl)}&color=059669`;

                return (
                    <div className="min-h-screen bg-slate-100 p-4 flex flex-col items-center py-10">
                        <div className="w-full max-w-md bg-white rounded-3xl overflow-hidden shadow-xl p-8 text-center">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-xl font-bold text-slate-800 text-left">Firma Sahibi QR Kod</h2>
                                <button onClick={() => setShowSettings(true)} className="text-slate-400 hover:text-slate-600 p-1.5 rounded-lg hover:bg-slate-100">
                                    <i data-lucide="settings" class="w-4 h-4"></i>
                                </button>
                            </div>
                            
                            <p className="text-xs text-slate-500 mb-6 text-left leading-relaxed">
                                Aşağıdaki QR kod okutulduğunda doğrudan seçilen firmanın borç ve denetim detaylarına yönlendirir.
                            </p>
                            
                            <select 
                                className="w-full bg-slate-50 border border-slate-300 p-3 rounded-lg text-sm mb-6 font-semibold outline-none focus:border-emerald-500"
                                value={selectedCompanyId}
                                onChange={(e) => setSelectedCompanyId(e.target.value)}
                            >
                                {companies.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                            </select>

                            {/* Uyarı Banner'ı */}
                            {(!serverIp || serverIp.startsWith('file:') || window.location.href.startsWith('blob:')) && (
                                <div className="bg-amber-50 text-amber-800 border border-amber-200 text-xs p-3 rounded-xl mb-4 text-left flex items-start gap-2">
                                    <i data-lucide="alert-triangle" class="w-4 h-4 shrink-0 text-amber-600 mt-0.5"></i>
                                    <span>
                                        <b>Yerel dosya veya Blob modundasınız!</b> Telefonunuzla bu QR kodu okutmadan önce lütfen sağ üstteki <b>ayar simgesinden</b> bilgisayarınızın yerel IP adresini veya Vercel adresinizi tanımlayın.
                                    </span>
                                </div>
                            )}

                            {selectedCompany && (
                                <div className="bg-white p-5 border-4 border-dashed border-emerald-500 rounded-3xl inline-block shadow-lg mb-4">
                                    <img src={qrImageSource} alt="QR Code" className="w-48 h-48 rounded-lg" />
                                </div>
                            )}

                            {/* QR Kodun yönlendirdiği gerçek URL bilgisi */}
                            <div className="bg-slate-50 p-3 rounded-xl mb-6 text-left">
                                <span className="text-[10px] font-bold text-slate-400 uppercase block">QR Linki</span>
                                <span className="text-xs font-semibold text-slate-600 break-all select-all">{qrUrl}</span>
                            </div>

                            <div className="flex gap-3">
                                <button onClick={() => navigateTo('qr_company', selectedCompany?.id)} className="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700">
                                    Simülatörü Aç
                                </button>
                                <button onClick={() => navigateTo('login')} className="flex-1 bg-slate-200 text-slate-700 py-3 rounded-xl font-bold">
                                    Geri Dön
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const QRGeneratorWorker = () => {
                const getDynamicQrUrl = () => {
                    let cleanedBase = serverIp;
                    if (!cleanedBase || cleanedBase.startsWith('file:') || cleanedBase === 'PROJE_YUKLENDIGINDE_BURAYA_URL_GELECEK') {
                        if (window.location.origin && !window.location.origin.startsWith('null') && !window.location.origin.startsWith('file:')) {
                            let originUrl = `${window.location.origin}${window.location.pathname}`;
                            if (originUrl.startsWith('blob:')) {
                                originUrl = originUrl.replace('blob:', '');
                            }
                            return `${originUrl}?view=worker`;
                        }
                        return `http://192.168.1.100:5500/index.html?view=worker`;
                    }
                    cleanedBase = cleanedBase.split('?')[0];
                    if (cleanedBase.startsWith('blob:')) {
                        cleanedBase = cleanedBase.replace('blob:', '');
                    }
                    return `${cleanedBase}?view=worker`;
                };

                const qrUrl = getDynamicQrUrl();
                const qrImageSource = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(qrUrl)}&color=ea580c`;

                return (
                    <div className="min-h-screen bg-slate-100 p-4 flex flex-col items-center py-10">
                        <div className="w-full max-w-md bg-white rounded-3xl overflow-hidden shadow-xl p-8 text-center">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-xl font-bold text-slate-800 text-left">İşçi Panosu Ortak QR</h2>
                                <button onClick={() => setShowSettings(true)} className="text-slate-400 hover:text-slate-600 p-1.5 rounded-lg hover:bg-slate-100">
                                    <i data-lucide="settings" class="w-4 h-4"></i>
                                </button>
                            </div>
                            
                            <p className="text-xs text-slate-500 mb-8 text-left leading-relaxed">
                                Bu ortak QR kodu sahaya veya yemekhaneye asarak, tüm çalışanların haftalık bilgilendirme bültenine mobil cihazlarıyla erişmesini sağlayabilirsiniz.
                            </p>

                            {/* Uyarı Banner'ı */}
                            {(!serverIp || serverIp.startsWith('file:') || window.location.href.startsWith('blob:')) && (
                                <div className="bg-amber-50 text-amber-800 border border-amber-200 text-xs p-3 rounded-xl mb-4 text-left flex items-start gap-2">
                                    <i data-lucide="alert-triangle" class="w-4 h-4 shrink-0 text-amber-600 mt-0.5"></i>
                                    <span>
                                        <b>Yerel dosya veya Blob modundasınız!</b> Telefonunuzla bu QR kodu okutmadan önce lütfen sağ üstteki <b>ayar simgesinden</b> bilgisayarınızın yerel IP adresini tanımlayın.
                                    </span>
                                </div>
                            )}

                            <div className="bg-white p-5 border-4 border-dashed border-orange-500 rounded-3xl inline-block shadow-lg mb-6">
                                <img src={qrImageSource} alt="QR Code" className="w-48 h-48 rounded-lg" />
                            </div>

                            <div className="bg-slate-50 p-3 rounded-xl mb-6 text-left">
                                <span className="text-[10px] font-bold text-slate-400 uppercase block">QR Linki</span>
                                <span className="text-xs font-semibold text-slate-600 break-all select-all">{qrUrl}</span>
                            </div>

                            <div className="flex gap-3">
                                <button onClick={() => navigateTo('qr_worker')} className="flex-1 bg-orange-600 text-white py-3 rounded-xl font-bold">
                                    Simülatörü Aç
                                </button>
                                <button onClick={() => navigateTo('login')} className="flex-1 bg-slate-200 text-slate-700 py-3 rounded-xl font-bold">
                                    Geri Dön
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- QR OKUTULDUĞUNDA TELEFONDA AÇILAN EKRANLAR ---
            const CompanyClientView = () => {
                const company = companies.find(c => c.id === selectedCompanyId) || companies[0];

                return (
                    <div className="min-h-screen bg-slate-800 p-4 flex flex-col items-center py-10">
                        <div className="w-full max-w-md bg-white rounded-3xl overflow-hidden shadow-2xl">
                            <div className="bg-emerald-500 p-6 text-center text-white">
                                <i data-lucide="building" class="w-12 h-12 mx-auto mb-2 opacity-90"></i>
                                <h2 className="text-xl font-bold opacity-90">Kollektif İSG Portal</h2>
                                <p className="text-emerald-100 text-sm">Uzaktan Takip Paneli</p>
                            </div>
                            <div className="p-6">
                                <h3 className="font-bold text-xl text-slate-800 text-center border-b pb-4 mb-6">{company.name}</h3>
                                <div className="space-y-6">
                                    <div>
                                        <div className="flex justify-between text-sm mb-2">
                                            <span className="font-semibold text-slate-600">Aylık Denetim Tamamlanma Durumu</span>
                                            <span className="font-bold text-emerald-600">%{company.progress}</span>
                                        </div>
                                        <div className="w-full bg-slate-100 rounded-full h-3">
                                            <div className="bg-emerald-500 h-3 rounded-full" style={{ width: `${company.progress}%` }}></div>
                                        </div>
                                    </div>
                                    <div className="flex bg-slate-50 rounded-2xl p-4 border border-slate-100 gap-4 items-center">
                                        <div className="bg-blue-100 p-3 rounded-full text-blue-600"><i data-lucide="calendar"></i></div>
                                        <div>
                                            <p className="text-xs text-slate-500 font-medium uppercase">Sonraki Uzman Ziyareti</p>
                                            <p className="text-lg font-bold text-slate-800">{company.nextVisit}</p>
                                        </div>
                                    </div>
                                    <div className="flex bg-slate-50 rounded-2xl p-4 border border-slate-100 gap-4 items-center">
                                        <div className="bg-red-100 p-3 rounded-full text-red-600"><i data-lucide="wallet"></i></div>
                                        <div>
                                            <p className="text-xs text-slate-500 font-medium uppercase">Güncel Cari Borç Bakiyesi</p>
                                            <p className="text-lg font-bold text-red-600">{company.debt}</p>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => navigateTo('qr_generator_company')} className="mt-8 w-full text-center text-slate-400 text-sm hover:text-slate-600">
                                   ← QR Oluşturucuya Geri Dön (Demo)
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const WorkerClientView = () => (
                <div className="min-h-screen bg-slate-100 p-4 flex flex-col items-center py-10">
                    <div className="w-full max-w-md bg-white rounded-3xl overflow-hidden shadow-xl">
                        <div className="bg-orange-500 p-6 text-center text-white">
                            <i data-lucide="alert-triangle" class="w-12 h-12 mx-auto mb-2 opacity-90"></i>
                            <h2 className="text-xl font-bold opacity-90">İSG İşçi Bilgilendirme</h2>
                            <p className="text-orange-100 text-sm">Haftalık Eğitim ve Uyarı Panosu</p>
                        </div>
                        <div className="p-6 space-y-4">
                            {bulletins.map(bulletin => (
                                <div key={bulletin.id} className="border border-slate-200 rounded-2xl p-5 shadow-sm">
                                    <span className="text-xs font-bold text-orange-500 uppercase tracking-wider">{bulletin.date}</span>
                                    <h3 className="font-bold text-lg text-slate-800 mt-1 mb-2">{bulletin.title}</h3>
                                    <p className="text-slate-600 text-sm leading-relaxed">{bulletin.content}</p>
                                </div>
                            ))}
                            <button onClick={() => navigateTo('qr_generator_worker')} className="mt-8 w-full text-center text-slate-400 text-sm hover:text-slate-600">
                               ← QR Oluşturucuya Geri Dön (Demo)
                            </button>
                        </div>
                    </div>
                </div>
            );

            // --- ANA RENDER AKIŞI ---
            return (
                <>
                    {currentView === 'manager' && <ManagerDashboard />}
                    {currentView === 'expert' && <ExpertDashboard />}
                    {currentView === 'qr_generator_company' && <QRGeneratorCompany />}
                    {currentView === 'qr_generator_worker' && <QRGeneratorWorker />}
                    {currentView === 'qr_company' && <CompanyClientView />}
                    {currentView === 'qr_worker' && <WorkerClientView />}
                    {currentView === 'login' && <LoginScreen />}
                    
                    {reportModal.isOpen && <ReportModal />}
                    {showSettings && <SettingsModal />}
                    
                    {/* Toast Bildirimi */}
                    <ToastNotification />
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
